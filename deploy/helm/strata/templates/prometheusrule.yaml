{{- if .Values.prometheusRule.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "strata.fullname" . }}
  labels:
    {{- include "strata.labels" . | nindent 4 }}
    {{- with .Values.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: strata.rules
      rules:
        - alert: StrataNoRaftLeader
          expr: max(strata_raft_is_leader) == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Strata cluster has no Raft leader"
            description: "No node reports strata_raft_is_leader=1 for 2m — writes are unavailable."
        - alert: StrataEmbeddingFailures
          expr: sum(rate(strata_memory_embed_failures_total[5m])) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Strata embeddings are failing"
            description: "strata_memory_embed_failures_total is increasing — memory search is degrading to BM25-only (check the embedding provider)."
        - alert: StrataHighReplicationLag
          expr: max(strata_raft_replication_lag) > 1000
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Strata Raft replication lag is high"
            description: "strata_raft_replication_lag > 1000 for 5m — a follower is falling behind the leader."
        - alert: StrataRaftLeaderFlapping
          expr: sum(rate(strata_raft_leader_changes_total[15m])) > 0.1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Strata Raft leadership is flapping"
            description: "Frequent strata_raft_leader_changes_total over 15m — cluster instability."
        - alert: StrataHighRequestLatency
          expr: histogram_quantile(0.99, sum by (le) (rate(strata_rest_request_duration_seconds_bucket[5m]))) > 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Strata REST p99 latency is high"
            description: "p99 of strata_rest_request_duration_seconds > 1s for 10m."
        - alert: StrataAgentRunFailures
          expr: sum(rate(strata_runs_completed_total{status="failed"}[10m])) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Strata agent runs are failing"
            description: "strata_runs_completed_total{status=\"failed\"} is increasing over 10m."
{{- end }}
